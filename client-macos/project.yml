name: BrainScan
options:
  bundleIdPrefix: com.brainscan
  createIntermediateGroups: true
  generateEmptyDirectories: false
  deploymentTarget:
    macOS: "12.3"   # минимум для ScreenCaptureKit (Phase C step 5)
  groupSortPosition: top

# Debug/Staging ходят в dev-окружение TimeWebCloud, Release — placeholder под будущий prod.
configs:
  Debug: debug
  Staging: release
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "12.3"
    # Dev-сборка: подпись стабильным самоподписанным сертификатом «BrainScan Dev»
    # (Keychain Access → Certificate Assistant → Code Signing). Стабильная подпись →
    # macOS не сбрасывает Screen Recording grant при каждой пересборке.
    # Перед релизом — отдельный план: notarization + Developer ID.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "BrainScan Dev"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    CLANG_ANALYZER_NONNULL: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  BrainScan:
    type: application
    platform: macOS
    sources:
      - path: BrainScan
    info:
      path: BrainScan/Info.plist
      properties:
        # Скрываем dock-иконку и Cmd+Tab — приложение живёт в menubar.
        LSUIElement: true
        CFBundleDisplayName: BrainScan
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "© 2026 BrainScan"
        NSPrincipalClass: NSApplication
        # Все сборки ходят через TLS (стандартный ATS).
        # Purpose-string для системного TCC-диалога Screen Recording.
        NSScreenCaptureUsageDescription: "BrainScan needs Screen Recording access to capture brain scans on your screen for analysis."
        # Подставляется при сборке из build-settings (`BRAINSCAN_API_BASE_URL`),
        # на рантайме читается в `APIConfig.baseURL` через `Bundle.main`.
        BrainScanAPIBaseURL: $(BRAINSCAN_API_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brainscan.client
        PRODUCT_NAME: BrainScan
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: BrainScan/Info.plist
      configs:
        Debug:
          # Dev-окружение в TimeWebCloud. Локальный docker-сервер больше не используется.
          BRAINSCAN_API_BASE_URL: https://dev-api.cfi-messenger.ru/api/v1
        Staging:
          BRAINSCAN_API_BASE_URL: https://dev-api.cfi-messenger.ru/api/v1
        Release:
          # TODO: подставить реальный prod-URL.
          BRAINSCAN_API_BASE_URL: https://api.brainscan.example.com/api/v1

  BrainScanTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BrainScanTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brainscan.client.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: BrainScan

schemes:
  BrainScan:
    build:
      targets:
        BrainScan: all
        BrainScanTests: [test]
    test:
      targets:
        - BrainScanTests
      gatherCoverageData: true
