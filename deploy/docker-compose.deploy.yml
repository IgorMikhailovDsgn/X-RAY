# BrainScan — production-ориентированный compose для деплоя на TimeWebCloud VPS.
# Поднимает: nginx-proxy + acme-companion (TLS) + server + worker + redis + migrate.
# НЕ поднимает: postgres, s3, mlflow — это managed-сервисы в TimeWebCloud.
#
# Запуск (типовой CI-деплой):
#   docker compose -f docker-compose.deploy.yml --env-file .env pull server worker
#   docker compose -f docker-compose.deploy.yml --env-file .env up -d
#
# Образы тянутся из GHCR (см. .github/workflows/build-deploy.yml). Тег берётся
# из IMAGE_TAG (короткий SHA коммита), дефолт `latest` — на случай ручного
# bootstrap-деплоя до того, как CI собрал первый SHA. Build-блоки оставлены,
# чтобы при необходимости можно было собрать образ локально на VPS:
#   docker compose -f docker-compose.deploy.yml --env-file .env build server worker

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    container_name: brainscan_nginx
    ports:
      - "80:80"
      - "443:443"
    # client_max_body_size задаётся per-vhost через `/etc/nginx/vhost.d/<DOMAIN>`
    # (см. deploy/README.md, шаг про post-deploy `client_max_body_size`).
    # basic-auth: nginx-proxy ищет файл /etc/nginx/htpasswd/<DOMAIN> и если есть —
    # вешает HTTP Basic Auth на vhost. Создаём вручную для MLflow (см. README).
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - vhost-htpasswd:/etc/nginx/htpasswd
      - html:/usr/share/nginx/html
      # Phase 9: persist per-vhost overrides (proxy_read_timeout 180s для cold
      # /detect). File-level bind накладывается поверх vhost-volume; auto-генерёнки
      # acme-companion в той же папке остаются нетронуты.
      - ./nginx-vhost.d/dev-api.cfi-messenger.ru_location:/etc/nginx/vhost.d/dev-api.cfi-messenger.ru_location:ro
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion:2.4
    container_name: brainscan_acme
    depends_on: [nginx-proxy]
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
      NGINX_PROXY_CONTAINER: brainscan_nginx
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  migrate:
    image: ghcr.io/igormikhailovdsgn/brainscan-server:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: brainscan_migrate
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  server:
    image: ghcr.io/igormikhailovdsgn/brainscan-server:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: brainscan_server
    env_file: .env
    environment:
      # nginx-proxy цепляет контейнер по этим переменным и автоматически
      # маршрутизирует ${API_DOMAIN} → этот сервер, плюс acme выпускает TLS.
      VIRTUAL_HOST: ${API_DOMAIN}
      VIRTUAL_PORT: "8000"
      LETSENCRYPT_HOST: ${API_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: ghcr.io/igormikhailovdsgn/brainscan-worker:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: ml/Dockerfile
    container_name: brainscan_worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: brainscan_redis
    # Публикуем ТОЛЬКО на host-localhost (не 0.0.0.0) — GPU-worker на отдельном
    # инстансе достучится через SSH-туннель (Phase 7), наружу порт закрыт.
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # MLflow tracking server. UI/API под mlflow.cfi-messenger.ru за nginx-proxy +
  # basic-auth (htpasswd в /etc/nginx/htpasswd/<domain> внутри тома vhost-htpasswd,
  # см. deploy/README.md → раздел про MLflow setup). SQLite-метаданные в
  # mlflow_data, артефакты в S3 (тот же бакет, prefix mlflow/).
  mlflow:
    build:
      context: .
      dockerfile: mlflow.Dockerfile
    image: brainscan/mlflow:2.19.0
    container_name: brainscan_mlflow
    environment:
      # nginx-proxy подхватит, выпустит cert через acme-companion.
      VIRTUAL_HOST: ${MLFLOW_DOMAIN}
      VIRTUAL_PORT: "5000"
      LETSENCRYPT_HOST: ${MLFLOW_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
      # S3-креды для подписи presigned URLs артефактов.
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      MLFLOW_S3_BUCKET: ${S3_BUCKET_MODELS}
      MLFLOW_S3_PREFIX: ${MLFLOW_S3_PREFIX:-mlflow/}
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

volumes:
  certs:
  vhost:
  vhost-htpasswd:
  html:
  acme:
  mlflow_data:
