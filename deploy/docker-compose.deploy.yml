# BrainScan — production-ориентированный compose для деплоя на TimeWebCloud VPS.
# Поднимает: nginx-proxy + acme-companion (TLS) + server + worker + redis + migrate.
# НЕ поднимает: postgres, s3, mlflow — это managed-сервисы в TimeWebCloud.
#
# Запуск (типовой CI-деплой):
#   docker compose -f docker-compose.deploy.yml --env-file .env pull server worker
#   docker compose -f docker-compose.deploy.yml --env-file .env up -d
#
# Образы тянутся из GHCR (см. .github/workflows/build-deploy.yml). Тег берётся
# из IMAGE_TAG (короткий SHA коммита), дефолт `latest` — на случай ручного
# bootstrap-деплоя до того, как CI собрал первый SHA. Build-блоки оставлены,
# чтобы при необходимости можно было собрать образ локально на VPS:
#   docker compose -f docker-compose.deploy.yml --env-file .env build server worker

services:
  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.6
    container_name: brainscan_nginx
    ports:
      - "80:80"
      - "443:443"
    # client_max_body_size задаётся per-vhost через `/etc/nginx/vhost.d/<DOMAIN>`
    # (см. deploy/README.md, шаг про post-deploy `client_max_body_size`).
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    restart: unless-stopped

  acme-companion:
    image: nginxproxy/acme-companion:2.4
    container_name: brainscan_acme
    depends_on: [nginx-proxy]
    environment:
      DEFAULT_EMAIL: ${LETSENCRYPT_EMAIL}
      NGINX_PROXY_CONTAINER: brainscan_nginx
    volumes:
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  migrate:
    image: ghcr.io/igormikhailovdsgn/brainscan-server:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: brainscan_migrate
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  server:
    image: ghcr.io/igormikhailovdsgn/brainscan-server:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: brainscan_server
    env_file: .env
    environment:
      # nginx-proxy цепляет контейнер по этим переменным и автоматически
      # маршрутизирует ${API_DOMAIN} → этот сервер, плюс acme выпускает TLS.
      VIRTUAL_HOST: ${API_DOMAIN}
      VIRTUAL_PORT: "8000"
      LETSENCRYPT_HOST: ${API_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    image: ghcr.io/igormikhailovdsgn/brainscan-worker:${IMAGE_TAG:-latest}
    build:
      context: ..
      dockerfile: ml/Dockerfile
    container_name: brainscan_worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: brainscan_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  certs:
  vhost:
  html:
  acme:
